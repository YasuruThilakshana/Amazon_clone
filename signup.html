<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignUp</title>
    <link rel="stylesheet" href="signup.css">
</head>
<body>

    <h1>Welcome To Amazon!</h1>
    <div class="singup-box">
     <h2>Sing Up</h2>
     <div class="property">
      <span>First name</span>
     <input type="text" placeholder="yasuru">
     </div>
     <div class="property">
      <span>Last name</span>
     <input type="text" placeholder="thilakshana">
     </div>
     <div class="property">
      <span>Mobile</span>
     <input type="number" placeholder="0789133375">
     </div>
     <div class="property">
      <span>Email</span>
     <input type="email" placeholder="yasuru@gmail.com">
     </div>
    <div class="property">
      <span>Password</span>
     <input type="password" placeholder="***********">
     </div>
     <button>
        Sign UP
     </button>
    </div>


    
</body>
</html>
